server {
    listen 80;

    # Raiz dos arquivos estáticos copiados pelo multi-stage build do frontend
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: qualquer rota que não seja um arquivo real é redirecionada para index.html.
    # Sem isso, recarregar a página em /alguma-rota retornaria 404 porque o Nginx tentaria
    # encontrar um arquivo físico com esse nome — o React Router gerencia as rotas no client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend FastAPI.
    # O frontend faz chamadas para /api/v1/... — o Nginx repassa para o container "backend"
    # na porta 8000. "backend" é o nome do serviço definido no docker-compose, resolvido
    # pela rede interna Docker (não é necessário expor a porta 8000 ao host)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
